<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Minimalistic pastebin for developers with winter vibe. Share code instantly. No registration, no tracking.">
    <title>❄️ CodeIgloo — холодное хранилище кода</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0b1420 0%, #03060c 100%);
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .snow i {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        .glass {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 100%;
            background: rgba(20, 30, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(100, 150, 200, 0.4);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid rgba(100, 150, 200, 0.3);
            background: rgba(10, 20, 35, 0.5);
        }
        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #ffffff, #80b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            display: inline-flex;
            gap: 12px;
            margin-top: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .badge span {
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #b0d4ff;
        }
        .content {
            padding: 28px;
        }
        textarea {
            width: 100%;
            height: 280px;
            background: rgba(10, 20, 35, 0.9);
            border: 1px solid #2c4a6e;
            color: #e0e0e0;
            padding: 16px;
            border-radius: 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #80b0ff;
            box-shadow: 0 0 10px rgba(128,176,255,0.3);
        }
        button {
            background: linear-gradient(135deg, #2a4a6e, #1a3a5a);
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            width: 100%;
            font-size: 1rem;
        }
        button:hover {
            background: #3a6a9e;
            box-shadow: 0 0 15px #80b0ff;
            transform: scale(1.02);
        }
        .result {
            margin-top: 28px;
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            display: none;
            backdrop-filter: blur(4px);
        }
        .result a {
            color: #80b0ff;
            text-decoration: none;
            word-break: break-all;
            font-size: 0.9rem;
        }
        .result a:hover {
            text-decoration: underline;
        }
        .promo {
            margin-top: 24px;
            padding: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            text-align: center;
            font-size: 0.8rem;
        }
        .promo a {
            color: #b0d4ff;
        }
        .footer {
            padding: 16px;
            text-align: center;
            border-top: 1px solid rgba(100, 150, 200, 0.3);
            font-size: 0.7rem;
            color: #6c8eb0;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            textarea { height: 200px; }
        }
    </style>
</head>
<body>
<div class="snow" id="snow"></div>
<div class="glass">
    <div class="header">
        <h1>❄️ CodeIgloo</h1>
        <div class="badge">
            <span>⚡ Нет регистрации</span>
            <span>📋 Копируй ссылку</span>
            <span>🧊 Зимний вайб</span>
        </div>
    </div>
    <div class="content">
        <textarea id="codeInput" placeholder='Вставь сюда код…&#10;Например:&#10;&#10;echo "Привет, мир!";'></textarea>
        <button id="saveBtn">🧊 Сохранить в Igloo</button>
        <div id="result" class="result">
            <p>✨ Ссылка на твой код (сохрани или отправь):</p>
            <a href="#" id="resultLink" target="_blank">ссылка</a>
            <button id="copyBtn" style="margin-top: 12px; width: auto; padding: 8px 20px;">📋 Копировать ссылку</button>
        </div>
        <div class="promo">
            🐙 <strong>TPickME</strong> — проекты с холодным кодом и горячим сердцем<br>
            🔥 <a href="https://github.com/web-pentest/DarkVPN">DarkVPN</a> • <a href="https://github.com/web-pentest/TSandCode">TSandCode</a> • <a href="https://github.com/web-pentest/PHPNoFluff">PHPNoFluff</a>
        </div>
    </div>
    <div class="footer">
        ❄️ open-source • никакой рекламы • без слежки
    </div>
</div>
<script>
    function createSnow() {
        const snowDiv = document.getElementById('snow');
        for (let i = 0; i < 100; i++) {
            const flake = document.createElement('i');
            flake.style.left = Math.random() * 100 + '%';
            flake.style.width = flake.style.height = Math.random() * 5 + 2 + 'px';
            flake.style.animationDuration = Math.random() * 4 + 3 + 's';
            flake.style.animationDelay = Math.random() * 5 + 's';
            snowDiv.appendChild(flake);
        }
    }
    createSnow();

    const saveBtn = document.getElementById('saveBtn');
    const codeInput = document.getElementById('codeInput');
    const resultDiv = document.getElementById('result');
    const resultLink = document.getElementById('resultLink');
    const copyBtn = document.getElementById('copyBtn');

    function getCurrentUrl() {
        return `${window.location.origin}${window.location.pathname}`;
    }

    saveBtn.addEventListener('click', () => {
        let code = codeInput.value.trim();
        if (!code) {
            alert('Введи код, бро!');
            return;
        }
        let encoded = btoa(unescape(encodeURIComponent(code)));
        let url = `${getCurrentUrl()}?code=${encoded}`;
        resultLink.href = url;
        resultLink.innerText = url;
        resultDiv.style.display = 'block';
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    });

    copyBtn.addEventListener('click', () => {
        const link = resultLink.href;
        navigator.clipboard.writeText(link).then(() => {
            alert('✅ Ссылка скопирована!');
        });
    });

    const urlParams = new URLSearchParams(window.location.search);
    const encodedCode = urlParams.get('code');
    if (encodedCode) {
        try {
            let decoded = decodeURIComponent(escape(atob(encodedCode)));
            codeInput.value = decoded;
            resultDiv.style.display = 'none';
        } catch(e) {
            console.log('Ошибка декодирования');
        }
    }
</script>
</body>
</html>
